name: Update Weather Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weather
  cancel-in-progress: true

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch weather data
        run: |
          node scripts/fetchWeather.js
          node scripts/fetchWindGrid.js
          node scripts/buildAirfieldsFromOurAirports.js
          node scripts/buildAlternatesFromCsv.js
        env:
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/weather.json data/windgrid.json data/airfields.json data/airfields_missing.txt data/alternates.json data/alternates_missing.txt
          git diff --cached --quiet || git commit -m "Update weather data"
          git push