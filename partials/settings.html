<!-- settings.html -->
<div class="view-settings__body">
  <div class="c-panel c-panel--stack">
    <div class="c-panel__head">
      <h2 class="c-title">Settings</h2>
    </div>

    <div class="c-panel__body">
      <!-- PASSWORT -->
      <div class="cg-row cg-row--config">
        <div class="cg-item">Passwort (Config)</div>

        <div class="cg-main">
          <input
            class="c-input"
            id="cfgPass"
            type="password"
            autocomplete="current-password"
            placeholder="Passwort eingeben">
        </div>

        <div class="cg-actions">
          <button class="c-btn" id="btnCfgLoad" type="button">Config laden</button>
          <button class="c-btn" id="btnCfgClearPass" type="button">Passwort löschen</button>
          <span id="cfgStatus" class="cg-status-inline"></span>
        </div>

        <div class="cg-status"></div>
      </div>

      <!-- FDL -->
      <div class="cg-row">
        <div class="cg-item">FDL</div>
        <div class="cg-main"><select class="c-select" id="fdlSelect"></select></div>
        <div class="cg-actions">FDL Telefon</div>
        <div class="cg-status" id="fdlTel" class="cg-value"></div>
      </div>

      <!-- MAIL EO -->
      <div class="cg-row cg-row--checkbox">
        <div class="cg-item">Mail EO</div>

        <div class="cg-main">
          <label class="cg-check">
            <input type="checkbox" id="mailEoUsePicker">
            <span>Dateien manuell auswählen</span>
          </label>
        </div>

        <div class="cg-actions"></div>
        <div class="cg-status"></div>
      </div>

      <!-- SIGNATUR -->
      <div class="cg-row cg-row--signature">
        <div class="cg-item">Unterschrift</div>

        <div class="cg-main">
          <div class="settings-signature">
            <div class="settings-signature__subtitle">
              Wird lokal auf diesem Gerät/Browser gespeichert.
            </div>

            <div class="settings-signature__actions">
              <label class="c-btn c-btn--ghost">
                Bild hochladen
                <input id="sigUpload" type="file" accept="image/*" hidden>
              </label>

              <button id="sigDraw" type="button" class="c-btn c-btn--ghost">Zeichnen</button>
              <button id="sigClear" type="button" class="c-btn c-btn--danger">Löschen</button>
            </div>

            <div id="sigStatus" class="settings-signature__status"></div>

            <div class="settings-signature__preview">
              <div class="c-label">Vorschau</div>
              <img
                id="sigPreview"
                alt="Unterschrift Vorschau"
                style="max-width:420px; background:#fff; border-radius:10px; display:none;">
            </div>
          </div>
        </div>

        <div class="cg-actions"></div>
        <div class="cg-status"></div>
      </div>
    </div>
  </div>
</div>
